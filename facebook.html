<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>
        *{
            margin:0%;
            padding: 0%;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }
        body{
            height: 100vh;
        }
        main{
            /*border: 1px solid red;*/
            height:90vh;
            display:grid;
            grid-template-columns:3fr 1fr;
        }
        .left{
           /* border: 1px solid black;*/
            display:grid;
            grid-template-columns:1fr 3fr;
             
        }
        .logo{
            /*border:1px solid black;*/
            display:flex;
            flex-direction:column;
            padding: 20px;
        }
        .logo-img{
            height:100px;
            width:100px;
        }
       .logo h1{
            font-size:54px;
            padding-top:250px;
       }
        .img img{
            height:600px;
            width:600px;
            display:flex;
            align-items:center;
        }
        span{
            color:blue;
        }
        .right{
            border-left:1px solid lightgrey;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .login{
            display:flex;
            flex-direction:column;
            gap:30px;
            width:80%;
            font-size:16px;
        }
        button,input{
            font-size:14px;
            padding:7px;
             border-radius: 10px;
            border:1px solid lightgrey;
        }
        #login{
            border-radius:20px ;
            background-color: blue;
            color:white;
            font-size:16px;
            font-weight:bold;
        }
        #forgot{
            border-radius:20px;
            background-color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }
        #create-new{
            border-radius:20px ;
            background-color: white;
            color:blue;
            font-size:16px;
            font-weight:bold;
            border:2px solid blue;
        }
        input:hover{
            border:1px solid black;
        }
        #forgot:hover{
            background-color:lightgray;
        }
        #create-new:hover{
            background-color:lightgray;
        }
        .footer{
            border-top: 1px solid grey;
            height:10vh;
            display:flex;
            justify-content:center;
            align-items:center;
        
        }
        a{
            text-decoration:none;
            color:blue;
            padding-right: 20px;
        }
        
    </style>
</head>
<body>
    <main>
        <div class="left">
        <div class="logo">
        <img class="logo-img" src="https://freepnglogo.com/images/all_img/facebook-logo.png" alt="">
        <h1>Explore the things <span>you love</span></h1>
        </div>
        <div class="img">
            <img src="https://static.xx.fbcdn.net/rsrc.php/y0/r/U45qBJmWVHU.webp" alt="">
        </div>
        </div>
   
        <div class="right">
            <div class="login">
            <p>log in to facebook</p>
            <input type="text" placeholder="Email address or Mobile number">
            <input type="password" placeholder="password">
            <button id="login">log in</button>
            <button id="forgot">Forgotten password</button>
            <button id="create-new">Create new account</button>
            </div>
        </div>
     </main>
    <div class="footer">
        <a href="">English (US)</a>
        <a href="">Español</a>
        <a href="">Français (France)</a>
        <a href="">中文(简体)</a>
        <a href="">العربية</a>
        <a href="">Português (Brasil)</a>
    </div>
</body>
</html>
