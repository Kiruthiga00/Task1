<script>
function check(num) {
    if (num % 2 == 0) {
        return "Even";
    } else {
        return "Odd";
    }
}
console.log(check(8));
</script>


<!-- anonymous function -->
<script>
var sampleFun=function(){
    console.log("Hello World");
}
sampleFun()
</script>


<!-- callback function -->
<script>
    function mainFun(callback){
        console.log("main function executed");
         callback()
    }
    //  console.log(callback)

    function callback(){
        console.log("callback function executed");
    }
    mainFun(callback)
    // callback()
</script>


<!-- callback function -->
<script>
function greet(name, callback) {
    console.log("Hello " + name);
    callback();
}

function message() {
    console.log("Welcome to JavaScript!");
}

greet("Kiruthiga", message);
