<script>

    const marks = [70, 90, 99, 30, 75];

    let total = 0;
    let result = "Pass";
    let highest = marks[0];

    for (let i = 0; i < 5; i++) {
        if (marks[i] < 35) {
            result = "Fail";
        }
        total = total + marks[i];
        if (marks[i] > highest) {
            highest = marks[i];
        }
        console.log(marks[i]);
    }
    console.log(result);
    console.log(total);
    console.log(highest);

</script>
