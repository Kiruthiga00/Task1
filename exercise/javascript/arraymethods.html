<!-- pop() -->
 <script>
    let g = ["HTML", "CSS", "JS", "React"];

<!-- push() -->
 <script>
    let h = ["HTML", "CSS", "JS", "React"];
    h.push("java");

 </script>


<!-- shift() -->

<!-- unshift -->
