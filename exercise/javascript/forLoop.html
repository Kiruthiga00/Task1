<!-- Divisors of given number -->
<script>
    let gN=50;
    for(let g=1; g<=gN; g++){
        if(gN%g==0){
            console.log(g);
        }
    }
</script>


<!--count of Divisors of given number -->
<script>
    let hN=50;
    let count=0;
    for(let h=1; h<=hN; h++){
        if(hN%h==0){
            count++;
        }
    }
    console.log("count:" +count);
</script>


<!-- prime number -->
<script>
   let iN=10;
    let countt=0;
    for(let i=1; i<=iN; i++){
        if(iN%i==0){
            countt++;
        }
    }
    if(countt==2){
        console.log("prime");
    }
    else{
        console.log("not prime");
    }
</script>
