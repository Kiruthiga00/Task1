<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefox Home</title>
    

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f5f5f8;
    height:100vh;
}

/* Top Browser Bar */
.top-bar{
    height:70px;
    display:flex;
    align-items:center;
    padding:0 20px;
    gap:20px;
    border-bottom:1px solid #ddd;
    background:white;
}

.tab{
    width:180px;
    height:40px;
    background:#f3f3f3;
    border-radius:10px;
    display:flex;
    align-items:center;
    padding:0 15px;
    gap:10px;
}

.tab i{
    color:#ff7139;
    font-size:22px;
}

.nav-icons{
    display:flex;
    gap:18px;
    color:#666;
}

.address-bar{
    flex:1;
    background:#f5f5f8;
    height:45px;
    border-radius:12px;
    display:flex;
    align-items:center;
    padding:0 15px;
}

.address-bar input{
    border:none;
    background:transparent;
    width:100%;
    margin-left:10px;
    outline:none;
    font-size:17px;
}

.right-icons{
    display:flex;
    gap:20px;
    font-size:20px;
    color:#666;
}

/* Main Section */
.container{
    text-align:center;
    margin-top:120px;
}

.logo-section{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.logo-section img{
    width:120px;
}

.logo-section h1{
    font-size:80px;
    color:#1f0055;
    font-weight:700;
}

/* Search */
.search-box{
    width:60%;
    margin:50px auto;
    background:white;
    height:70px;
    border-radius:18px;
    display:flex;
    align-items:center;
    padding:0 25px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.search-box input{
    flex:1;
    border:none;
    outline:none;
    font-size:22px;
    margin-left:15px;
}

.search-box i:last-child{
    font-size:24px;
    color:#777;
}

/* Top Sites */
.sites{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
}

.site{
    text-align:center;
}

.icon{
    width:110px;
    height:110px;
    background:white;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.youtube{
    color:red;
}

.wiki{
    font-size:60px;
    font-family:serif;
}

.amazon{
    color:black;
}

.github{
    color:black;
}

.gmail{
    color:#ea4335;
}

.facebook{
    color:#1877f2;
}

.site p{
    margin-top:15px;
    font-size:18px;
}
    </style>
</head>
<body>

    <!-- Browser Top Bar -->
    <div class="top-bar">
        <div class="tab">
            <i class="fa-brands fa-firefox-browser"></i>
            <span>New Tab</span>
        </div>

        <div class="nav-icons">
            <i class="fa-solid fa-arrow-left"></i>
            <i class="fa-solid fa-arrow-right"></i>
            <i class="fa-solid fa-rotate-right"></i>
        </div>

        <div class="address-bar">
            <i class="fa-brands fa-google"></i>
            <input type="text"
            placeholder="Search with Google or enter address">
        </div>

        <div class="right-icons">
            <i class="fa-regular fa-star"></i>
            <i class="fa-regular fa-circle-user"></i>
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <div class="logo-section">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a0/Firefox_logo%2C_2019.svg"
            alt="Firefox">
            <h1>Firefox</h1>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <i class="fa-brands fa-google"></i>
            <input type="text"
            placeholder="Search with Google or enter address">
            <i class="fa-solid fa-arrow-right"></i>
        </div>

        <!-- Top Sites -->
        <div class="sites">

            <div class="site">
                <div class="icon youtube">
                    <i class="fa-brands fa-youtube"></i>
                </div>
                <p>YouTube</p>
            </div>

            <div class="site">
                <div class="icon wiki">W</div>
                <p>Wikipedia</p>
            </div>

            <div class="site">
                <div class="icon amazon">
                    <i class="fa-brands fa-amazon"></i>
                </div>
                <p>Amazon</p>
            </div>

            <div class="site">
                <div class="icon github">
                    <i class="fa-brands fa-github"></i>
                </div>
                <p>GitHub</p>
            </div>

            <div class="site">
                <div class="icon gmail">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <p>Gmail</p>
            </div>

            <div class="site">
                <div class="icon facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </div>
                <p>Facebook</p>
            </div>

        </div>

    </div>

</body>
</html>
