<!-- Divisors of given number -->
<script>
    let gN=50;
    let g=1;
    while(g<=gN){
        if(gN%g==0){
            console.log(g);
        }
        g++;
    }
</script>


<!--count of Divisors of given number -->
<script>
    let hN=50;
    let h=1;
    let count=0;
    while(h<=hN){
        if(hN%h==0){
            count++;
        }
        h++;
    }
    console.log("count: " + count);
</script>


<!-- prime number -->
<script>
    let iN=5;
    let i=1;
    let countt=0;
    while(i<=iN){
        if(iN%i==0){
            countt++;
        }
        i++;
    }
    if(countt==2){
        console.log("prime" );
    }
    else{
        console.log("not prime");
    }
</script>
