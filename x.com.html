<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X.com</title>
    <script src="https://kit.fontawesome.com/ce2c251167.js" crossorigin="anonymous"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            /* border: 1px solid black; */
            height: 100vh;
        }

        .top {
            /* border: 1px solid red; */
            height: 90vh;
            display: grid;
            grid-template-columns: 2fr 2fr;
        }

        .left {
            /* border: 1px solid black; */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        h1 {
            font-size: 50px;
        }

        button,
        input {
            width: 250px;
            border-radius: 20px;
            padding: 10px;
        }

        input {
            padding-left: 8px;
            border: 0.5px solid lightgrey;
        }

        .phone {
            background-color: black;
            color: white;
            cursor: pointer;
        }

        .mail,
        .apple {
            background-color: white;
            border: 0.5px solid lightgrey;
            cursor: pointer;
        }

        .right {
            /* border: 1px solid green; */
            display: flex;
            justify-content: center;
            align-items: center;

        }

        img {
            width: 500px;
            height: 500px;

        }

        .bottom {
            /* border: 1px solid yellow; */
            height: 10vh;
            display: flex;
            justify-content: center;
            flex-direction: row;
        }

        a {
            color: black;
            text-decoration: none;
            padding-right: 15px;
            padding-top: 30px;
            cursor: pointer;
        }

        p {
            padding-right: 10px;
            padding-top: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top">
            <div class="left">
                <h1>Happening now.</h1>
                <button class="phone">
                    <i class="fa-solid fa-phone"></i>
                    Continue with phone
                </button>

                <button class="mail">
                    <i class="fa-brands fa-google"></i>
                    Continue with gmail
                </button>

                <button class="apple">
                    <i class="fa-brands fa-apple"></i>
                    Continue with apple
                </button>

                <input type="text" placeholder="Email or username">
                <button style=" border:none ;">Continue </button>

            </div>

            <div class="right">
                <img
                    src="https://up.yimg.com/ib/th/id/OIP.oNrf7pYcAfPqnmgENVkuvAHaHa?pid=Api&rs=1&c=1&qlt=95&w=124&h=124">
            </div>
        </div>
